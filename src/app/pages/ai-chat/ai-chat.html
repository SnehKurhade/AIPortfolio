<section class="section">
  <div class="container">
    <div class="section-title">
      <h2>Chat with AI Sneh</h2>
    </div>
    <p class="section-subtitle">Ask me anything about my experience, skills, projects, and background!</p>
    
    <!-- Groq API Configuration -->
    <div class="api-config">
      <button 
        (click)="toggleApiKeyInput()" 
        class="config-btn"
        [class.configured]="isGroqConfigured"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m2.12-2.12l4.24-4.24M19.78 19.78l-4.24-4.24m-2.12-2.12l-4.24-4.24"></path>
        </svg>
        {{ isGroqConfigured ? '⚡ Groq Configured' : '⚙️ Configure Groq API' }}
      </button>
      
      <div *ngIf="showApiKeyInput" class="api-key-input-container">
        <p>Enter your Groq API key for faster, more intelligent responses:</p>
        <div class="input-group">
          <input 
            [(ngModel)]="apiKeyInput"
            type="password"
            placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
            class="api-key-input"
          />
          <button (click)="configureApiKey()" class="save-btn">
            Save
          </button>
          <button (click)="toggleApiKeyInput()" class="cancel-btn">
            Cancel
          </button>
        </div>
        <p class="info-text">
          Get a free API key from <a href="https://console.groq.com" target="_blank">console.groq.com</a>
        </p>
      </div>
    </div>
    
    <div class="chat-wrapper">
      <div class="messages-container" #messagesContainer>
        <div *ngFor="let message of messages" [class.user]="message.role === 'user'" class="message">
          <div class="message-content">{{ message.content }}</div>
        </div>
        
        <div *ngIf="loading" class="message assistant">
          <div class="message-content loading">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </div>
      </div>
      
      <div class="input-area">
        <div class="input-wrapper">
          <input 
            [(ngModel)]="userInput" 
            (keyup.enter)="sendMessage()"
            [disabled]="loading"
            type="text" 
            placeholder="Ask me something... e.g., 'What AI projects have you built?'"
            class="chat-input"
          />
          <button 
            (click)="sendMessage()" 
            [disabled]="loading || !userInput.trim()"
            class="send-btn"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        
        <div class="suggested-questions">
          <p>Try asking:</p>
          <div class="question-buttons">
            <button 
              *ngFor="let question of exampleQuestions"
              (click)="askQuestion(question)"
              [disabled]="loading"
              class="question-btn"
            >
              {{ question }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
